version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: amco_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amco_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  bot:
    build: .
    container_name: amco_bot
    command: >
      sh -c "
        until nc -z $$DB_HOST $$DB_PORT; do echo 'Жду бд...'; sleep 1; done;
        alembic upgrade head;
        python -m src.bot.main
      "
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - AMO_ACCESS_TOKEN=${AMO_ACCESS_TOKEN}
      - AMO_DOMAIN=${AMO_DOMAIN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - BOT_WEBHOOK_URL=${BOT_WEBHOOK_URL}
      - BOT_USERNAME=${BOT_USERNAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  api:
    build: .
    container_name: amco_api
    command: >
      sh -c "
        until nc -z $$DB_HOST $$DB_PORT; do echo 'Жду бд...'; sleep 1; done;
        alembic upgrade head;
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - AMO_ACCESS_TOKEN=${AMO_ACCESS_TOKEN}
      - AMO_DOMAIN=${AMO_DOMAIN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - BOT_WEBHOOK_URL=${BOT_WEBHOOK_URL}
      - BOT_USERNAME=${BOT_USERNAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

volumes:
  pgdata:
  redis_data: