version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: amco_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: amco_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  bot:
    build: .
    container_name: amco_bot
    command: python -m src.bot.main
    volumes:
      - .:/app
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - AMO_ACCESS_TOKEN=${AMO_ACCESS_TOKEN}
      - AMO_DOMAIN=${AMO_DOMAIN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - BOT_WEBHOOK_URL=${BOT_WEBHOOK_URL}
      - BOT_USERNAME=${BOT_USERNAME}
    depends_on:
      - db
      - redis
    restart: always

  api:
    build: .
    container_name: amco_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - AMO_ACCESS_TOKEN=${AMO_ACCESS_TOKEN}
      - AMO_DOMAIN=${AMO_DOMAIN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - BOT_WEBHOOK_URL=${BOT_WEBHOOK_URL}
      - BOT_USERNAME=${BOT_USERNAME}
    depends_on:
      - db
      - redis
    restart: always

volumes:
  pgdata:
  redis_data: