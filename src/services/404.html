<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена | AMCO CLINIC</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ebf7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'Jost', sans-serif;
  }

  .page {
    width: 100%;
    max-width: 760px;
  }

  .cert {
    background: #ffffff;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .accent-top {
    height: 5px;
    background: #b9a4ff;
  }

  .cert-body {
    padding: 52px 64px 44px;
    position: relative;
    text-align: center;
  }

  .deco-circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .deco-1 {
    width: 320px; height: 320px;
    border: 1px solid #f0ebf7;
    right: -80px; top: 50%;
    transform: translateY(-50%);
  }
  .deco-2 {
    width: 220px; height: 220px;
    border: 1px solid #ede8f5;
    right: -30px; top: 50%;
    transform: translateY(-50%);
  }


  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
    flex-direction: column;
  }

  .logo-wrap {
    width: 220px;
    max-width: 60%;  
  }
  .logo-wrap svg {
    width: 100%;
    height: auto;
  }

  .divider {
    height: 0.5px;
    background: #ede8f5;
    margin-bottom: 36px;
    width: 100%;
  }


  .error-code-section {
    margin-bottom: 36px;
  }

  .error-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 120px;
    font-weight: 300;
    color: #b9a4ff; 
    line-height: 1;
    letter-spacing: -0.02em;
    opacity: 0.8;
  }

  .error-text {
    font-size: 18px;
    font-weight: 400;
    color: #2a1a35;
    line-height: 1.6;
    margin-top: 20px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .hint-text {
    font-size: 14px;
    color: #c4b8d4;
    margin-top: 10px;
  }

  .cert-footer {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 28px;
    border-top: 0.5px solid #ede8f5;
    margin-top: 40px;
  }

  .cert-contacts {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #c4b8d4;
    line-height: 1.8;
  }

  .accent-bottom {
    height: 5px;
    background: linear-gradient(90deg, #b9a4ff 0%, #ddd4ff 60%, #ede8f5 100%);
  }

  @media (max-width: 480px) {
    .cert-body {
        padding: 32px 28px 32px;
    }
    .error-number {
        font-size: 80px;
    }
    .logo-wrap {
        width: 160px;
    }
  }
</style>
</head>
